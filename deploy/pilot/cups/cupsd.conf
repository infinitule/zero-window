# CUPS configuration for the pilot print servers.
#
# Open access on the pilot network only. This is NOT a production print-room
# configuration: a real deployment restricts by subnet and requires
# authentication for administrative operations. See runbooks/exam-day.md.
LogLevel warn
MaxLogSize 0
ErrorLog /dev/stderr
AccessLog /dev/null

Listen 0.0.0.0:631
Browsing Off
DefaultAuthType Basic
WebInterface No

# IPP everywhere: the centre node speaks RFC 8011 to these queues.
DefaultEncryption Never

<Location />
  Order allow,deny
  Allow all
</Location>

<Location /admin>
  Order allow,deny
  Allow all
</Location>

<Location /admin/conf>
  AuthType Default
  Require user @SYSTEM
  Order allow,deny
  Allow all
</Location>

<Policy default>
  JobPrivateAccess default
  JobPrivateValues default
  SubscriptionPrivateAccess default
  SubscriptionPrivateValues default

  <Limit Create-Job Print-Job Print-URI Validate-Job>
    Order deny,allow
  </Limit>

  <Limit Send-Document Send-URI Hold-Job Release-Job Restart-Job Purge-Jobs \
         Set-Job-Attributes Create-Job-Subscription Renew-Subscription \
         Cancel-Subscription Get-Notifications Reprocess-Job Cancel-Current-Job \
         Suspend-Current-Job Resume-Job Cancel-My-Jobs Close-Job CUPS-Move-Job>
    Order deny,allow
  </Limit>

  <Limit All>
    Order deny,allow
  </Limit>
</Policy>
